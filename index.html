<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c1f2b">
<title>Mondial 2026 — Mon suivi</title>
<style>
  :root{
    --bg:#eef2f4; --card:#ffffff; --ink:#1b2730; --muted:#6b7a86;
    --line:#dde5ea; --head:#0c1f2b; --green:#0e9f6e; --greenD:#0a7d56;
    --win:#1faf6b; --draw:#9aa7b1; --loss:#e0556b; --gold:#f3c33b; --fr:#1f3a93;
    --hbar:#2563eb; --abar:#ef4444; --dbar:#94a3b8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%;}
  header{background:var(--head); color:#fff; padding:14px 14px 8px;
    position:sticky; top:0; z-index:20; box-shadow:0 2px 8px rgba(0,0,0,.18)}
  .htop{display:flex; align-items:center; justify-content:space-between; gap:8px}
  header h1{font-size:17px; margin:0; font-weight:800; letter-spacing:.2px}
  header h1 small{display:block; font-weight:500; font-size:11px; color:#9fb4c2; margin-top:2px}
  .refresh{background:#16313f; color:#cfe0ea; border:1px solid #21455a; border-radius:8px;
    font-size:11px; padding:6px 9px; cursor:pointer}
  .tabs{display:flex; gap:6px; margin-top:10px}
  .tab{flex:1; text-align:center; padding:9px 4px; border-radius:9px 9px 0 0; cursor:pointer;
    font-size:13px; font-weight:700; color:#9fb4c2; background:#0f2734}
  .tab.active{background:var(--bg); color:var(--ink)}
  main{max-width:680px; margin:0 auto; padding:12px 12px 60px}
  .filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center}
  .chip{padding:6px 11px; border-radius:999px; border:1px solid var(--line); background:#fff;
    font-size:12px; font-weight:700; cursor:pointer; color:var(--muted)}
  .chip.on{background:var(--ink); color:#fff; border-color:var(--ink)}
  select{padding:7px 9px; border-radius:9px; border:1px solid var(--line); background:#fff;
    font-size:12px; font-weight:600; color:var(--ink)}
  .daygroup{margin:14px 0 4px; font-size:12px; font-weight:800; color:var(--muted);
    text-transform:uppercase; letter-spacing:.4px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:13px; padding:10px 11px;
    margin-bottom:9px; box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .card.fr{border-color:#c9d4f7; box-shadow:0 0 0 2px #e6ecfc inset}
  .mrow{display:flex; align-items:center; gap:8px}
  .meta{font-size:11px; color:var(--muted); font-weight:700; min-width:72px}
  .meta .g{display:inline-block; background:#eef3f6; color:#51616c; border-radius:5px; padding:1px 5px; margin-left:0}
  .side{flex:1; display:flex; align-items:center; gap:7px; min-width:0}
  .side.r{justify-content:flex-end; text-align:right}
  .flag{font-size:18px; line-height:1}
  .tn{font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .score{display:flex; align-items:center; gap:5px}
  .score input{width:34px; height:34px; text-align:center; border:1.5px solid var(--line);
    border-radius:9px; font-size:16px; font-weight:800; color:var(--ink); background:#fbfdff}
  .score input:focus{outline:none; border-color:var(--green)}
  .dash{color:var(--muted); font-weight:800}
  .probwrap{margin-top:8px}
  .probbar{display:flex; height:9px; border-radius:6px; overflow:hidden; border:1px solid #e7edf1}
  .probbar i{display:block}
  .problbl{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted);
    margin-top:3px; font-weight:700}
  .tab-note{font-size:11px;color:#7e57c2}
  .form{display:inline-flex; gap:3px; margin-left:4px}
  .form b{width:8px; height:8px; border-radius:2px; display:inline-block}
  .fW{background:var(--win)} .fN{background:var(--draw)} .fL{background:var(--loss)}
  .tabwin{margin-top:7px; font-size:11px; color:var(--muted); display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .tabwin button{border:1px solid var(--line); background:#fff; border-radius:7px; padding:4px 8px;
    font-size:11px; font-weight:700; cursor:default; color:var(--ink)}
  .tabwin button.sel{background:var(--gold); border-color:#e0ad1f}
  /* groups */
  .gtitle{display:flex; align-items:center; gap:8px; margin:16px 0 6px; font-weight:800}
  .gtitle .badge{background:var(--green); color:#fff; border-radius:7px; padding:2px 9px; font-size:13px}
  .gtitle.fr .badge{background:var(--fr)}
  table{width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line);
    border-radius:11px; overflow:hidden; font-size:12px}
  th,td{padding:6px 5px; text-align:center}
  th{background:#f4f7f9; color:#56666f; font-weight:800; font-size:10.5px}
  td.t{text-align:left; font-weight:700}
  tr.q{background:#eafaf2}
  tr.q3{background:#fff7e6}
  .pts{font-weight:800}
  .mini{margin-top:6px}
  /* bracket */
  .round{margin:16px 0 6px; font-size:13px; font-weight:800; color:var(--head);
    border-bottom:2px solid var(--green); padding-bottom:4px; display:flex; justify-content:space-between}
  .round span{font-size:11px;color:var(--muted);font-weight:700}
  .kcard{background:#fff;border:1px solid var(--line);border-radius:11px;padding:8px 10px;margin-bottom:8px}
  .kcard.fr{border-color:var(--gold); box-shadow:0 0 0 2px #fdf2cf inset}
  .kteam{display:flex;align-items:center;gap:7px;padding:3px 0}
  .kteam .tn{font-size:13px}
  .kteam.win .tn{color:var(--greenD)}
  .kin{width:32px;height:30px;text-align:center;border:1.5px solid var(--line);border-radius:8px;
    font-size:15px;font-weight:800;color:var(--ink);background:#fbfdff}
  .kin:focus{outline:none;border-color:var(--green)}
  .ks{margin-left:auto}
  .ph{color:var(--muted);font-style:italic;font-weight:600;font-size:12.5px}
  .legend{font-size:11px;color:var(--muted);margin:10px 2px;line-height:1.5}
  .legend b{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:-1px;margin:0 2px}
  footer{max-width:680px;margin:0 auto;padding:4px 14px 30px;color:#8a98a2;font-size:11px;line-height:1.6}
  /* Données live */
  .score input[readonly],.kin[readonly]{background:#f0f4f6;cursor:default}
  .score input[readonly]:focus,.kin[readonly]:focus{border-color:var(--line)}
  .score input[data-live],.kin[data-live]{background:#fff8e8;border-color:#f59e0b}
  .live-badge{display:inline-block;background:#f59e0b;color:#fff;border-radius:4px;
    font-size:9px;font-weight:800;padding:1px 5px;margin-left:4px;vertical-align:middle;
    letter-spacing:.3px;animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .errbanner{background:#fff3cd;border:1px solid #ffc107;border-radius:9px;
    padding:8px 12px;font-size:12px;margin-bottom:10px;color:#856404}
  .dstamp{font-size:10.5px;color:var(--muted);text-align:right;margin-bottom:6px;font-weight:600}
  .loading{text-align:center;padding:40px 12px;color:var(--muted);font-size:13px;font-weight:700}
  /* Badges chaînes */
  .ch{display:inline-block;font-size:9px;font-weight:800;border-radius:4px;
      padding:1px 4px;margin:3px 3px 0 0;line-height:1.3;white-space:nowrap}
  .ch.m6{background:#ffe1ea;color:#c81e5b}
  .ch.bein{background:#e7defb;color:#5b3aa6}
</style>
</head>

const FR_PATH = new Set(["M77","M89","M97","M101","M104"]);

/* ===================== ÉTAT LIVE ===================== */
let R = {};            // scores live injectés depuis data/fixtures.json
let liveIds = new Set(); // matchs EN COURS
let dataError = false;
let lastUpdated = "";

async function loadLiveData() {
  try {
    const res = await fetch("data/fixtures.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    R = {};
    liveIds = new Set();

    // 1er passage : matchs de poule
    data.matches.forEach(m => {
      const isLive = m.status === "IN_PLAY" || m.status === "PAUSED" || m.status === "HALFTIME";
      const isDone = m.status === "FINISHED";
      if (!isLive && !isDone) return;
      if (m.stage !== "GROUP_STAGE") return;

      const hFR = TLA_TO_FR[m.homeTeam?.tla];
      const aFR = TLA_TO_FR[m.awayTeam?.tla];
      if (!hFR || !aFR) return;

      const sh = m.score?.fullTime?.home;
      const sa = m.score?.fullTime?.away;
      if (sh == null || sa == null) return;

      const gm = gmByTeams[hFR + "|" + aFR];
      if (!gm) return;

      R[gm.id] = { id: gm.id, h: sh, a: sa };
      if (isLive) liveIds.add(gm.id);
    });

    // 2e passage : matchs KO (après avoir résolu les groupes)
    const { teamOf } = koResolve();
    data.matches.forEach(m => {
      const isLive = m.status === "IN_PLAY" || m.status === "PAUSED" || m.status === "HALFTIME";
      const isDone = m.status === "FINISHED";
      if (!isLive && !isDone) return;
      if (m.stage === "GROUP_STAGE") return;

      const hFR = TLA_TO_FR[m.homeTeam?.tla];
      const aFR = TLA_TO_FR[m.awayTeam?.tla];
      if (!hFR || !aFR) return;

      const sh = m.score?.fullTime?.home;
      const sa = m.score?.fullTime?.away;
      if (sh == null || sa == null) return;

      for (const ko of KO) {
        const res = teamOf[ko.id];
        if (res && res.a === hFR && res.b === aFR) {
          R[ko.id] = { id: ko.id, h: sh, a: sa };
          // Si victoire aux t.a.b. (égalité en temps réglementaire)
          if (isDone && sh === sa && m.score?.winner) {
            R[ko.id].w = (m.score.winner === "HOME_TEAM") ? "h" : "a";
          }
          if (isLive) liveIds.add(ko.id);
          break;
        }
      }
    });

    lastUpdated = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    dataError = false;
  } catch(e) {
    console.warn("Données live indisponibles :", e.message);
    dataError = true;
  }
}

/* ===================== PROBAS ===================== */
function probGroup(rh,ra){
  const Eh=1/(1+Math.pow(10,(ra-rh)/400));
  const m=2*Math.abs(Eh-0.5);
  const pD=0.30*(1-m);
  const pH=(1-pD)*Eh, pA=(1-pD)*(1-Eh);
  return {h:pH,d:pD,a:pA};
}
function probKO(rh,ra){ const Eh=1/(1+Math.pow(10,(ra-rh)/400)); return {h:Eh,a:1-Eh}; }
const pct=x=>Math.round(x*100);

/* ===================== CLASSEMENTS ===================== */
function blank(){return {J:0,G:0,N:0,P:0,BP:0,BC:0,Pts:0};}
function standings(g){
  const t={}; Object.keys(TEAMS).filter(n=>TEAMS[n][1]===g).forEach(n=>t[n]=Object.assign({name:n},blank()));
  GM.filter(m=>m[0]===g).forEach(m=>{
    const r=R[m.id]; if(!r||r.h===""||r.a===""||r.h==null||r.a==null)return;
    const h=+r.h,a=+r.a,H=t[m[3]],A=t[m[4]]; if(!H||!A)return;
    H.J++;A.J++;H.BP+=h;H.BC+=a;A.BP+=a;A.BC+=h;
    if(h>a){H.G++;A.P++;H.Pts+=3;} else if(h<a){A.G++;H.P++;A.Pts+=3;} else {H.N++;A.N++;H.Pts++;A.Pts++;}
  });
  return Object.values(t).sort(cmp);
}
function cmp(x,y){ const dx=x.BP-x.BC, dy=y.BP-y.BC;
  return y.Pts-x.Pts || dy-dx || y.BP-x.BP || x.name.localeCompare(y.name); }
function groupDone(g){ return GM.filter(m=>m[0]===g).every(m=>{const r=R[m.id];return r&&r.h!==""&&r.a!==""&&r.h!=null&&r.a!=null;}); }
function allGroupsDone(){ return "ABCDEFGHIJKL".split("").every(groupDone); }

// 8 meilleurs 3es + affectation aux slots
function thirdsAssign(){
  if(!allGroupsDone()) return null;
  let thirds="ABCDEFGHIJKL".split("").map(g=>{const s=standings(g)[2]; return Object.assign({g},s);});
  thirds.sort((x,y)=> y.Pts-x.Pts || (y.BP-y.BC)-(x.BP-x.BC) || y.BP-x.BP);
  const top=thirds.slice(0,8); const groupsIn=top.map(t=>t.g);
  const slots=Object.keys(T_ALLOWED);
  const used={}, res={};
  function bt(i){ if(i===slots.length)return true; const s=slots[i];
    for(const g of T_ALLOWED[s]){ if(groupsIn.includes(g)&&!used[g]){ used[g]=1;res[s]=g; if(bt(i+1))return true; delete used[g]; } }
    return false; }
  if(!bt(0)){ slots.forEach((s,i)=>res[s]=groupsIn[i]); }
  const out={}; for(const s in res){ out[s]=standings(res[s])[2].name; }
  return out;
}

/* ===================== RÉSOLUTION TABLEAU ===================== */
function koResolve(){
  const W={},Rn={};
  "ABCDEFGHIJKL".split("").forEach(g=>{ if(groupDone(g)){const s=standings(g); W[g]=s[0].name; Rn[g]=s[1].name;} });
  const T=thirdsAssign();
  const winners={}; const teamOf={};
  function ref(r){
    if(!r) return null;
    const [k,v]=r.split(":");
    if(k==="W") return W[v]||null;
    if(k==="R") return Rn[v]||null;
    if(k==="T") return T?T[v]:null;
    if(k==="V") return winners[v]!==undefined?winners[v]:null;
    if(k==="P"){ const w=winners[v]; const t=teamOf[v]; if(w&&t){ return t.a===w?t.b:t.a; } return null; }
    return null;
  }
  KO.forEach(m=>{
    const a=ref(m.a), b=ref(m.b); teamOf[m.id]={a,b};
    const r=R[m.id];
    if(a&&b&&r&&r.h!==""&&r.a!==""&&r.h!=null&&r.a!=null){
      const hh=+r.h,aa=+r.a;
      if(hh>aa)winners[m.id]=a; else if(aa>hh)winners[m.id]=b;
      else if(r.w)winners[m.id]=(r.w==="h"?a:b);
    }
  });
  return {teamOf,winners};
}

function formHTML(n){ if(!TEAMS[n])return "";

function matchCardG(m){
  const r=R[m.id]; const isFR=(m[3]==="France"||m[4]==="France");
  const isLive=liveIds.has(m.id);
  const p=probGroup(TEAMS[m[3]][2],TEAMS[m[4]][2]);

    '<div class="mrow"><div class="meta">'+m[2]+liveTag+'<br><span class="g">Gr. '+m[0]+'</span><br>'+chBadges(chGroup(m))+'</div>'+
    '<div class="side"><span class="flag">'+flag(m[3])+'</span><span class="tn">'+m[3]+'</span></div>'+
    scoreInputs(m.id,r)+
    '<div class="side r"><span class="tn">'+m[4]+'</span><span class="flag">'+flag(m[4])+'</span></div></div>'+
    probBar(p,false)+'</div>';
}
function matchCardK(m,res){
  const a=res?res.a:null, b=res?res.b:null; const r=R[m.id];
  const isFR=FR_PATH.has(m.id);
  const isLive=liveIds.has(m.id);
  const liveTag=isLive?'<span class="live-badge">● EN COURS</span>':'';
  const aH=a?('<span class="flag">'+flag(a)+'</span><span class="tn">'+a+'</span>'):'<span class="ph">'+slotLabel(m.a)+'</span>';
  const bH=b?('<span class="tn">'+b+'</span><span class="flag">'+flag(b)+'</span>'):'<span class="ph">'+slotLabel(m.b)+'</span>';
  let pbar=''; if(a&&b){ pbar=probBar(probKO(TEAMS[a][2],TEAMS[b][2]),true); }
  let body='<div class="mrow"><div class="meta">'+m.h+liveTag+'<br><span class="g">'+m.st+'</span><br>'+chBadges(chKO(m,a,b))+'</div>'+
    '<div class="side">'+aH+'</div>'+scoreInputs(m.id,r)+'<div class="side r">'+bH+'</div></div>'+pbar;
  // Afficher le vainqueur t.a.b. en lecture seule si connu
  if(a&&b&&r&&r.h!=null&&r.a!=null&&r.h!==""&&r.a!==""&&(+r.h===+r.a)&&r.w){
    body+='<div class="tabwin">Victoire aux t.a.b. :'+
      '<button disabled class="'+(r.w==="h"?"sel":"")+'">'+a+'</button>'+
      '<button disabled class="'+(r.w==="a"?"sel":"")+'">'+b+'</button></div>';
  }
  return '<div class="card'+(isFR?' fr':'')+'">'+body+'</div>';
}
function slotLabel(ref){ const [k,v]=ref.split(":");
  if(k==="W")return "1er Gr. "+v; if(k==="R")return "2e Gr. "+v;
  if(k==="T")return "3e ("+T_ALLOWED[v].join("/")+")"; if(k==="V")return "Vainq. "+v.replace("M","M");
  if(k==="P")return "Perdant "+v; return "?"; }

function kline(mid,ref,name,w,side,r){
  const win=(name&&w===name)?' win':'';

                    : '<span class="ph">'+slotLabel(ref)+'</span>';

  const liveAttr=live?' data-live="1"':'';

  return '<div class="kteam'+win+'">'+left+'<span class="ks">'+inp+'</span></div>';

function frDate(d){ const p=d.split("/"); return p[0]+" "+(p[1]==="6"?"juin":"juillet"); }

/* ----- Scroll sur le jour courant ----- */
// Choix de convention : on suit les dates J/M du calendrier en heure locale (CEST, UTC+2 en été).
// Un match à "4h" le 14/6 est bien le samedi 14 juin à 4h du matin — même jour calendaire.
// new Date() est déjà en heure locale du navigateur, pas besoin de conversion fuseau.
function todayKey(){ const n=new Date(); return n.getDate()+"/"+(n.getMonth()+1); }

function focusDate(dates){
  const ti=DATE_ORDER.indexOf(todayKey());
  const ord=[...dates].sort((a,b)=>DATE_ORDER.indexOf(a)-DATE_ORDER.indexOf(b));
  if(!ord.length) return null;
  if(ti<0) return ord[0];                                          // avant le Mondial
  if(ord.includes(todayKey())) return todayKey();                  // aujourd'hui a des matchs
  return ord.find(d=>DATE_ORDER.indexOf(d)>=ti)||ord[ord.length-1]; // prochain jour, ou dernier
}

function scrollToDate(d){
  if(!d) return;
  const el=document.querySelector('.daygroup[data-date="'+d+'"]'); if(!el) return;
  const headH=document.querySelector('header').offsetHeight;
  const y=el.getBoundingClientRect().top+window.pageYOffset-headH-6;
  window.scrollTo({top:y,behavior:'auto'});
}
