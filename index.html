  .tab.active{background:var(--bg); color:var(--ink)}

  .filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center}
  .chip{padding:6px 11px; border-radius:999px; border:1px solid var(--line); background:#fff;

  .meta{font-size:11px; color:var(--muted); font-weight:700; min-width:72px}

  .side{flex:1; display:flex; align-items:center; gap:7px; min-width:0}
  .side.r{justify-content:flex-end; text-align:right}
  .flag{font-size:18px; line-height:1}

  .score{display:flex; align-items:center; gap:5px}

  .dash{color:var(--muted); font-weight:800}

  .probbar{display:flex; height:9px; border-radius:6px; overflow:hidden; border:1px solid #e7edf1}

  .problbl{display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted);

</head>

let R = {};            // scores live inject├йs depuis data/fixtures.json
let liveIds = new Set(); // matchs EN COURS
let dataError = false;
let lastUpdated = "";

async function loadLiveData() {
  try {
    const res = await fetch("data/fixtures.json");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    R = {};
    liveIds = new Set();

    // 1er passage : matchs de poule
    data.matches.forEach(m => {
      const isLive = m.status === "IN_PLAY" || m.status === "PAUSED" || m.status === "HALFTIME";
      const isDone = m.status === "FINISHED";
      if (!isLive && !isDone) return;
      if (m.stage !== "GROUP_STAGE") return;

      const hFR = TLA_TO_FR[m.homeTeam?.tla];
      const aFR = TLA_TO_FR[m.awayTeam?.tla];
      if (!hFR || !aFR) return;

      const sh = m.score?.fullTime?.home;
      const sa = m.score?.fullTime?.away;
      if (sh == null || sa == null) return;

      const gm = gmByTeams[hFR + "|" + aFR];
      if (!gm) return;

      R[gm.id] = { id: gm.id, h: sh, a: sa };
      if (isLive) liveIds.add(gm.id);
    });

    // 2e passage : matchs KO (apr├иs avoir r├йsolu les groupes)
    const { teamOf } = koResolve();
    data.matches.forEach(m => {
      const isLive = m.status === "IN_PLAY" || m.status === "PAUSED" || m.status === "HALFTIME";
      const isDone = m.status === "FINISHED";
      if (!isLive && !isDone) return;
      if (m.stage === "GROUP_STAGE") return;

      const hFR = TLA_TO_FR[m.homeTeam?.tla];
      const aFR = TLA_TO_FR[m.awayTeam?.tla];
      if (!hFR || !aFR) return;

      const sh = m.score?.fullTime?.home;
      const sa = m.score?.fullTime?.away;
      if (sh == null || sa == null) return;

      for (const ko of KO) {
        const res = teamOf[ko.id];
        if (res && res.a === hFR && res.b === aFR) {
          R[ko.id] = { id: ko.id, h: sh, a: sa };
          // Si victoire aux t.a.b. (├йgalit├й en temps r├йglementaire)
          if (isDone && sh === sa && m.score?.winner) {
            R[ko.id].w = (m.score.winner === "HOME_TEAM") ? "h" : "a";
          }
          if (isLive) liveIds.add(ko.id);
          break;
        }
      }
    });

    lastUpdated = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    dataError = false;
  } catch(e) {
    console.warn("Donn├йes live indisponibles :", e.message);
    dataError = true;
  }
}

/* ===================== PROBAS ===================== */
function probGroup(rh,ra){
  const Eh=1/(1+Math.pow(10,(ra-rh)/400));
  const m=2*Math.abs(Eh-0.5);
  const pD=0.30*(1-m);
  const pH=(1-pD)*Eh, pA=(1-pD)*(1-Eh);
  return {h:pH,d:pD,a:pA};
}
function probKO(rh,ra){ const Eh=1/(1+Math.pow(10,(ra-rh)/400)); return {h:Eh,a:1-Eh}; }
const pct=x=>Math.round(x*100);

/* ===================== CLASSEMENTS ===================== */
function blank(){return {J:0,G:0,N:0,P:0,BP:0,BC:0,Pts:0};}
function standings(g){
  const t={}; Object.keys(TEAMS).filter(n=>TEAMS[n][1]===g).forEach(n=>t[n]=Object.assign({name:n},blank()));
  GM.filter(m=>m[0]===g).forEach(m=>{
    const r=R[m.id]; if(!r||r.h===""||r.a===""||r.h==null||r.a==null)return;
    const h=+r.h,a=+r.a,H=t[m[3]],A=t[m[4]]; if(!H||!A)return;
    H.J++;A.J++;H.BP+=h;H.BC+=a;A.BP+=a;A.BC+=h;
    if(h>a){H.G++;A.P++;H.Pts+=3;} else if(h<a){A.G++;H.P++;A.Pts+=3;} else {H.N++;A.N++;H.Pts++;A.Pts++;}
  });
  return Object.values(t).sort(cmp);
}
function cmp(x,y){ const dx=x.BP-x.BC, dy=y.BP-y.BC;
  return y.Pts-x.Pts || dy-dx || y.BP-x.BP || x.name.localeCompare(y.name); }
function groupDone(g){ return GM.filter(m=>m[0]===g).every(m=>{const r=R[m.id];return r&&r.h!==""&&r.a!==""&&r.h!=null&&r.a!=null;}); }
function allGroupsDone(){ return "ABCDEFGHIJKL".split("").every(groupDone); }

// 8 meilleurs 3es + affectation aux slots
function thirdsAssign(){
  if(!allGroupsDone()) return null;
  let thirds="ABCDEFGHIJKL".split("").map(g=>{const s=standings(g)[2]; return Object.assign({g},s);});
  thirds.sort((x,y)=> y.Pts-x.Pts || (y.BP-y.BC)-(x.BP-x.BC) || y.BP-x.BP);
  const top=thirds.slice(0,8); const groupsIn=top.map(t=>t.g);
  const slots=Object.keys(T_ALLOWED);
  const used={}, res={};
  function bt(i){ if(i===slots.length)return true; const s=slots[i];
    for(const g of T_ALLOWED[s]){ if(groupsIn.includes(g)&&!used[g]){ used[g]=1;res[s]=g; if(bt(i+1))return true; delete used[g]; } }
    return false; }
  if(!bt(0)){ slots.forEach((s,i)=>res[s]=groupsIn[i]); }
  const out={}; for(const s in res){ out[s]=standings(res[s])[2].name; }
  return out;
}

/* ===================== R├ЙSOLUTION TABLEAU ===================== */
function koResolve(){
  const W={},Rn={};
  "ABCDEFGHIJKL".split("").forEach(g=>{ if(groupDone(g)){const s=standings(g); W[g]=s[0].name; Rn[g]=s[1].name;} });
  const T=thirdsAssign();
  const winners={}; const teamOf={};
  function ref(r){
    if(!r) return null;
    const [k,v]=r.split(":");
    if(k==="W") return W[v]||null;
    if(k==="R") return Rn[v]||null;
    if(k==="T") return T?T[v]:null;
    if(k==="V") return winners[v]!==undefined?winners[v]:null;
    if(k==="P"){ const w=winners[v]; const t=teamOf[v]; if(w&&t){ return t.a===w?t.b:t.a; } return null; }
    return null;
  }
  KO.forEach(m=>{
    const a=ref(m.a), b=ref(m.b); teamOf[m.id]={a,b};
    const r=R[m.id];
    if(a&&b&&r&&r.h!==""&&r.a!==""&&r.h!=null&&r.a!=null){
      const hh=+r.h,aa=+r.a;
      if(hh>aa)winners[m.id]=a; else if(aa>hh)winners[m.id]=b;
      else if(r.w)winners[m.id]=(r.w==="h"?a:b);
    }
  });
  return {teamOf,winners};
}

function flag(n){return TEAMS[n]?TEAMS[n][0]:"тЪк";}
function resultChar(isHome,h,a){
  if(h===a) return "N";
  return ((h>a)===isHome) ? "W" : "L";
}
function formFor(name,teamOf){
  const played=[];
  GM.forEach(m=>{
    if(m[3]!==name&&m[4]!==name) return;
    const r=R[m.id]; if(!r||r.h===""||r.a===""||r.h==null||r.a==null) return;
    played.push({date:m[1],hr:m[2],char:resultChar(m[3]===name,+r.h,+r.a)});
  });
  KO.forEach(m=>{
    const t=teamOf[m.id]; if(!t) return;
    if(t.a!==name&&t.b!==name) return;
    const r=R[m.id]; if(!r||r.h===""||r.a===""||r.h==null||r.a==null) return;
    played.push({date:m.date,hr:m.h,char:resultChar(t.a===name,+r.h,+r.a)});
  });
  played.sort((x,y)=> DATE_ORDER.indexOf(y.date)-DATE_ORDER.indexOf(x.date)||hourVal(y.hr)-hourVal(x.hr));
  const chars=played.map(p=>p.char);
  const pre=(TEAMS[name]&&TEAMS[name][3])?TEAMS[name][3].split(""): [];
  return chars.concat(pre).slice(0,5).join("");
}

      else if(fGroup!=="ALL"&&fGroup!=="FR"&&m[0]!==fGroup)return;

  }

  list.sort((x,y)=> DATE_ORDER.indexOf(x.date)-DATE_ORDER.indexOf(y.date) || hourVal(x.h)-hourVal(y.h));

  const ti=DATE_ORDER.indexOf(todayKey());

/* ===================== SIMULATION FINALE ===================== */
let finaleTarget = "France";

function simulateFinalists(target, N) {
  N = N || 20000;
  let reach = 0;
  const oppCount = {};
  Object.keys(TEAMS).forEach(function(t){ oppCount[t] = 0; });

  // Local standings computed against a simulated-scores dict sR
  function simStandings(g, sR) {
    const t = {};
    Object.keys(TEAMS).filter(function(n){ return TEAMS[n][1]===g; }).forEach(function(n){
      t[n] = {name:n,J:0,G:0,N:0,P:0,BP:0,BC:0,Pts:0};
    });
    GM.filter(function(m){ return m[0]===g; }).forEach(function(m){
      const r = sR[m.id]; if(!r) return;
      const h=+r.h, a=+r.a, H=t[m[3]], A=t[m[4]]; if(!H||!A) return;
      H.J++;A.J++;H.BP+=h;H.BC+=a;A.BP+=a;A.BC+=h;
      if(h>a){H.G++;A.P++;H.Pts+=3;}else if(h<a){A.G++;H.P++;A.Pts+=3;}else{H.N++;A.N++;H.Pts++;A.Pts++;}
    });
    return Object.values(t).sort(cmp);
  }

  function simThirdsAssign(sR) {
    const thirds = "ABCDEFGHIJKL".split("").map(function(g){
      const s = simStandings(g, sR)[2];
      return Object.assign({g:g}, s);
    });
    thirds.sort(function(x,y){ return y.Pts-x.Pts||(y.BP-y.BC)-(x.BP-x.BC)||y.BP-x.BP; });
    const top = thirds.slice(0,8);
    const groupsIn = top.map(function(t){ return t.g; });
    const slots = Object.keys(T_ALLOWED);
    const used = {}, res = {};
    function bt(i){
      if(i===slots.length) return true;
      const s = slots[i];
      for(let gi=0; gi<T_ALLOWED[s].length; gi++){
        const g = T_ALLOWED[s][gi];
        if(groupsIn.indexOf(g)>=0 && !used[g]){
          used[g]=1; res[s]=g;
          if(bt(i+1)) return true;
          delete used[g];
        }
      }
      return false;
    }
    if(!bt(0)) slots.forEach(function(s,i){ res[s]=groupsIn[i]; });
    const out = {};
    for(const s in res) out[s] = simStandings(res[s], sR)[2].name;
    return out;
  }

  function simKoResolve(sR) {
    const W={}, Rn={};
    "ABCDEFGHIJKL".split("").forEach(function(g){
      const s = simStandings(g, sR);
      W[g]=s[0].name; Rn[g]=s[1].name;
    });
    const T = simThirdsAssign(sR);
    const winners={}, teamOf={};
    function ref(r){
      if(!r) return null;
      const sep=r.indexOf(":"); const k=r.slice(0,sep), v=r.slice(sep+1);
      if(k==="W") return W[v]||null;
      if(k==="R") return Rn[v]||null;
      if(k==="T") return T?T[v]:null;
      if(k==="V") return winners[v]!==undefined?winners[v]:null;
      if(k==="P"){ const w=winners[v], t=teamOf[v]; if(w&&t) return t.a===w?t.b:t.a; return null; }
      return null;
    }
    KO.forEach(function(m){
      const a=ref(m.a), b=ref(m.b);
      teamOf[m.id]={a:a,b:b};
      if(!a||!b) return;
      const r=sR[m.id];
      if(r&&r.h!=null&&r.h!==""&&r.a!=null&&r.a!==""){
        const hh=+r.h, aa=+r.a;
        if(hh>aa) winners[m.id]=a;
        else if(aa>hh) winners[m.id]=b;
        else if(r.w) winners[m.id]=(r.w==="h"?a:b);
        else winners[m.id]=(Math.random()<0.5?a:b);
      } else {
        const rh=TEAMS[a]?TEAMS[a][2]:1500, ra=TEAMS[b]?TEAMS[b][2]:1500;
        winners[m.id]=(Math.random()<probKO(rh,ra).h?a:b);
      }
    });
    return {teamOf:teamOf, winners:winners};
  }

  for(let i=0; i<N; i++){
    const sR = Object.assign({}, R);

    // Simulate group matches not yet played
    GM.forEach(function(m){
      const r=R[m.id];
      if(r&&r.h!=null&&r.h!==""&&r.a!=null&&r.a!=="") return;
      const rh=TEAMS[m[3]]?TEAMS[m[3]][2]:1500, ra=TEAMS[m[4]]?TEAMS[m[4]][2]:1500;
      const p=probGroup(rh,ra), rnd=Math.random();
      if(rnd<p.h)      sR[m.id]={h:1,a:0};
      else if(rnd<p.h+p.d) sR[m.id]={h:0,a:0};
      else                 sR[m.id]={h:0,a:1};
    });

    const res = simKoResolve(sR);
    const tf = res.teamOf["M104"];
    if(!tf||!tf.a||!tf.b) continue;

    if(tf.a===target||tf.b===target){
      reach++;
      const opp = tf.a===target ? tf.b : tf.a;
      if(opp) oppCount[opp]++;
    }
  }

  const opps = Object.keys(TEAMS)
    .filter(function(t){ return t!==target && oppCount[t]>0; })
    .map(function(t){ return {name:t, count:oppCount[t]}; })
    .sort(function(a,b){ return b.count-a.count; });

  return {reach:reach, N:N, opps:opps};
}

function buildFinaleHTML(result, target) {
  const reach=result.reach, N=result.N, opps=result.opps;
  const reachPct = Math.round(reach/N*100);
  const tFlag = TEAMS[target]?TEAMS[target][0]:"тЪк";
  let html = "";

  html += '<div class="card" style="margin-bottom:14px;text-align:center;padding:14px 11px">';
  html += '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">'+tFlag+' '+target+' ┬╖ probabilit├й d\'atteindre la finale</div>';
  html += '<div class="finale-reach" style="color:'+(reachPct>0?'var(--greenD)':'var(--loss)')+'">'+reachPct+' %</div>';
  html += '<div class="finale-sub">sur '+N.toLocaleString('fr-FR')+' simulations Monte-Carlo</div>';
  if(reachPct===0){
    html += '<div style="margin-top:10px;font-size:12px;color:var(--muted);font-style:italic">├Йlimin├йe ┬╖ aucun chemin vers la finale d├йtect├й.</div>';
  }
  html += '</div>';

  if(opps.length>0){
    html += '<div class="finale-opp-lbl">Adversaires possibles en finale</div>';
    const maxCount = opps[0].count;
    opps.forEach(function(o){
      const oPct = Math.round(o.count/N*100);
      const barW = Math.round(o.count/maxCount*100);
      const oFlag = TEAMS[o.name]?TEAMS[o.name][0]:"тЪк";
      html += '<div class="card" style="padding:8px 11px;margin-bottom:7px">';
      html += '<div class="finale-item">';
      html += '<span style="font-size:18px;line-height:1">'+oFlag+'</span>';
      html += '<span style="font-weight:700;font-size:13.5px;flex:1">'+o.name+'</span>';
      html += '<span style="font-weight:800;font-size:14px">'+oPct+' %</span>';
      html += '</div>';
      html += '<div style="height:6px;border-radius:3px;background:#e7edf1;margin-top:5px">';
      html += '<div class="finale-bar" style="width:'+barW+'%"></div>';
      html += '</div>';
      html += '</div>';
    });
  }
  return html;
}

function startFinaleCalc() {
  const resultDiv = document.getElementById('finale-result');
  if(!resultDiv) return;
  resultDiv.innerHTML = '<div class="loading">Calcul en coursтАж</div>';
  setTimeout(function(){
    const result = simulateFinalists(finaleTarget, 20000);
    resultDiv.innerHTML = buildFinaleHTML(result, finaleTarget);
  }, 0);
}

function renderFinale() {
  const root = document.getElementById('finale');
  const teamNames = Object.keys(TEAMS).sort(function(a,b){ return a.localeCompare(b,'fr'); });
  let html = '<div class="filters">';
  html += '<select id="finale-sel">';
  teamNames.forEach(function(t){
    html += '<option value="'+t+'"'+(t===finaleTarget?' selected':'')+'>'+TEAMS[t][0]+' '+t+'</option>';
  });
  html += '</select>';
  html += '<button id="finale-btn" class="refresh" style="font-size:12px;padding:6px 10px">тЯ│ Recalculer</button>';
  html += '</div>';
  html += '<div id="finale-result"><div class="loading">Calcul en coursтАж</div></div>';
  root.innerHTML = html;
  document.getElementById('finale-sel').onchange = function(e){
    finaleTarget = e.target.value;
    startFinaleCalc();
  };
  document.getElementById('finale-btn').onclick = function(){ startFinaleCalc(); };
  startFinaleCalc();
}

/* ===================== ├ЙV├ЙNEMENTS ===================== */
let active="matchs";
let openGroups=new Set();
document.querySelectorAll('.tab').forEach(tb=>tb.onclick=()=>{
  active=tb.getAttribute('data-v');
  openGroups.clear(); // auto-repli ├а chaque changement d'onglet
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===tb));
  ['matchs','groupes','tableau','parie','finale'].forEach(v=>document.getElementById(v).style.display=(v===active?'':'none'));
  // autoFocus=true uniquement sur l'onglet Matchs (pas sur filtre ni saisie)
  if(active==="matchs") renderMatchs(true);
  else if(active==="groupes") renderGroupes();
  else if(active==="parie") renderParie();
  else if(active==="finale") renderFinale();
  else renderTableau();
});

document.getElementById('refreshBtn').onclick=async()=>{
  const btn=document.getElementById('refreshBtn');
  btn.textContent="тЯ│тАж"; btn.disabled=true;
  await Promise.all([loadLiveData(), loadOddsData()]);
  // Actualiser scrolle aussi sur le jour courant si on est sur l'onglet Matchs
  if(active==="matchs") renderMatchs(true);
  else rerender();
  btn.textContent="тЯ│ Actualiser"; btn.disabled=false;
};

// rerender sans scroll (changements internes : filtre, recalcul)
function rerender(){ if(active==="matchs")renderMatchs(); else if(active==="groupes")renderGroupes(); else if(active==="parie")renderParie(); else if(active==="finale")renderFinale(); else renderTableau(); }

/* ===================== INIT ===================== */
async function init(){
  await Promise.all([loadLiveData(), loadOddsData()]);
  renderMatchs(true); // ouvre sur les matchs du jour au chargement
}
init();
</script>
